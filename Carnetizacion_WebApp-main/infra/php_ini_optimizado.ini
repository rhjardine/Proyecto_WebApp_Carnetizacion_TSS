; ============================================================
; SISTEMA DE CARNETIZACIÓN INTELIGENTE (SCI-TSS)
; Configuración optimizada de PHP para manejo de imágenes
; Archivo: php.ini (reemplazar sección en XAMPP)
; Ubicación XAMPP: C:\xampp\php\php.ini
; ============================================================
; PROPÓSITO:
;   Soportar carga de fotografías de identificación de hasta 10 MB,
;   procesamiento con la extensión GD (redimensionamiento, recorte)
;   y evitar errores de memoria o timeout durante el proceso.
;
; INSTRUCCIONES DE APLICACIÓN EN XAMPP:
;   1. Abrir XAMPP Control Panel → Apache → Stop (detener Apache)
;   2. Hacer clic en "Config" → "PHP (php.ini)"
;   3. Buscar y reemplazar cada directiva indicada en este archivo
;   4. Guardar el archivo php.ini
;   5. Reiniciar Apache desde XAMPP Control Panel → Start
;   6. Verificar cambios: http://localhost/phpinfo.php
; ============================================================

; ── SECCIÓN: Límites de Subida de Archivos ───────────────────
; [BÚSQUEDA EN php.ini: "file_uploads"]

; Habilita la subida de archivos (debe estar activo)
file_uploads = On

; Tamaño máximo de un archivo individual subido.
; ⬛ Valor actual (defecto):  upload_max_filesize = 2M
; ✅ Valor requerido SCI-TSS: Soporte hasta 10 MB por fotografía
upload_max_filesize = 10M

; Tamaño máximo del cuerpo HTTP completo de una petición POST.
; REGLA CRÍTICA: post_max_size SIEMPRE debe ser MAYOR que upload_max_filesize.
; Si envías una foto de 10M más datos del formulario, necesitas margen.
; ⬛ Valor actual (defecto):  post_max_size = 8M
; ✅ Valor requerido SCI-TSS: 12M (10M foto + 2M datos de formulario)
post_max_size = 12M

; Número máximo de archivos subidos simultáneamente en una sola request.
; Útil si en el futuro se implementa carga múltiple de imágenes.
max_file_uploads = 5

; ── SECCIÓN: Límites de Memoria ──────────────────────────────
; [BÚSQUEDA EN php.ini: "memory_limit"]
; 
; Memoria RAM que puede consumir UN script PHP por ejecución.
; El procesamiento GD de imágenes de alta resolución es intensivo en memoria.
;
; CÁLCULO TÉCNICO para imágenes de 10 MB con GD:
;   - Una imagen JPEG de 10 MB puede tener ~3000x4000 px (12M píxeles)
;   - En memoria GD: ancho × alto × 4 bytes (RGBA) = 3000×4000×4 = ~46 MB
;   - Buffer intermedio para redimensionar: ×2 = ~92 MB
;   - Overhead PHP + stack de llamadas: ~30 MB adicionales
;   - TOTAL estimado: ~122 MB → redondeamos a 256M con margen de seguridad
;
; ⬛ Valor actual (defecto):  memory_limit = 128M
; ✅ Valor requerido SCI-TSS: 256M (con margen para procesamiento GD)
memory_limit = 256M

; ── SECCIÓN: Límites de Tiempo de Ejecución ──────────────────
; [BÚSQUEDA EN php.ini: "max_execution_time"]
;
; Tiempo máximo en segundos que puede tardar un script.
; La validación + redimensionamiento GD de una imagen de 10 MB puede
; tomar varios segundos en hardware institucional moderado.
;
; ⬛ Valor actual (defecto):  max_execution_time = 30
; ✅ Valor requerido SCI-TSS: 120 (2 minutos, suficiente para GD + I/O)
max_execution_time = 120

; Tiempo máximo para recibir datos (separado del tiempo de ejecución).
; Relevante en conexiones lentas de red institucional.
; ⬛ Valor actual (defecto):  max_input_time = 60
; ✅ Valor requerido SCI-TSS: 90
max_input_time = 90

; ── SECCIÓN: Extensiones Requeridas ──────────────────────────
; [BÚSQUEDA EN php.ini: ";extension=gd" — descomentar si está comentada]
;
; En XAMPP: buscar la línea y eliminar el punto y coma inicial.
; ANTES: ;extension=gd
; DESPUÉS: extension=gd
extension=gd

; Si XAMPP usa php_gd2 (versiones antiguas):
; extension=php_gd2.dll   (Windows XAMPP)

; ── SECCIÓN: Manejo de Errores (Pre-Producción) ──────────────
; [BÚSQUEDA EN php.ini: "display_errors"]
;
; En Pre-Producción: mostrar errores facilita el debugging.
; En Producción OBLIGATORIO: cambiar ambos a Off y log a un archivo.
;
; ✅ Pre-Producción:
display_errors = On
log_errors = On
error_reporting = E_ALL

; 🔴 Producción (descomentar y cambiar al pasar a prod):
; display_errors = Off
; log_errors = On
; error_log = C:\xampp\php\logs\php_error.log
; error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── SECCIÓN: Sesiones (Seguridad) ────────────────────────────
; [BÚSQUEDA EN php.ini: "session."]
;
; Configuración de sesiones seguras para el sistema de login.
session.cookie_httponly = 1      ; Previene acceso JavaScript a la cookie → Anti-XSS
session.cookie_samesite = Strict ; Bloquea envío cross-site → Anti-CSRF
session.use_strict_mode = 1      ; Previene Session Fixation
session.gc_maxlifetime = 7200    ; Sesión expira después de 2 horas de inactividad

; En HTTPS (producción): descomentar la siguiente línea
; session.cookie_secure = 1

; ── RESUMEN DE CAMBIOS REQUERIDOS ────────────────────────────
; Directiva              | Valor Defecto | Valor SCI-TSS
; -----------------------+---------------+---------------
; upload_max_filesize    | 2M            | 10M
; post_max_size          | 8M            | 12M
; memory_limit           | 128M          | 256M
; max_execution_time     | 30            | 120
; max_input_time         | 60            | 90
; max_file_uploads       | 20            | 5
; extension=gd           | (comentada)   | (habilitada)
; session.cookie_httponly| 0             | 1
; session.use_strict_mode| 0             | 1
; ============================================================
