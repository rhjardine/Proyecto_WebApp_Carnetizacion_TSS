<VirtualHost *:80>
    ServerName carnetizacion.entidad.gob
    ServerAdmin admin@entidad.gob

    # Document Root for Frontend (React Build)
    DocumentRoot "/var/www/carnetizacion/frontend/dist"
    
    <Directory "/var/www/carnetizacion/frontend/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Rewrite rules for SPA (Single Page Application)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [QSA,L]
    </Directory>

    # Reverse Proxy for Backend API
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api

    ErrorLog ${APACHE_LOG_DIR}/carnetizacion-error.log
    CustomLog ${APACHE_LOG_DIR}/carnetizacion-access.log combined
</VirtualHost>
