<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cambio Obligatorio de Contraseña — SCI-TSS</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="login-page">
        <div class="login-left">
            <div class="login-logo">🔐</div>
            <h1>Cambio Obligatorio</h1>
            <p>Debe actualizar su contraseña antes de continuar.</p>
        </div>
        <div class="login-right">
            <div class="login-box">
                <h2>Actualizar contraseña</h2>
                <p class="sub">Por seguridad, complete este paso para habilitar nuevamente su acceso.</p>

                <div id="alert-box"></div>

                <form id="force-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="current-password">Contraseña actual</label>
                        <input id="current-password" type="password" class="form-input" autocomplete="current-password" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="new-password">Nueva contraseña</label>
                        <input id="new-password" type="password" class="form-input" minlength="6" autocomplete="new-password" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirm-password">Confirmar nueva contraseña</label>
                        <input id="confirm-password" type="password" class="form-input" minlength="6" autocomplete="new-password" required />
                    </div>
                    <button type="submit" id="force-btn" class="btn btn-primary" style="width:100%;justify-content:center;">
                        Guardar nueva contraseña
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        (function () {
            const user = api.getCurrentUser();
            if (!user || !user.username) {
                window.location.href = 'login.html';
                return;
            }
            if (!user.requires_password_change) {
                window.location.href = 'dashboard.html';
            }
        })();

        document.getElementById('force-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('force-btn');
            const currentPass = document.getElementById('current-password').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass.length < 6) {
                ui.showAlert('alert-box', 'La nueva contraseña debe tener al menos 6 caracteres.');
                return;
            }
            if (newPass !== confirmPass) {
                ui.showAlert('alert-box', 'La confirmación de contraseña no coincide.');
                return;
            }

            ui.setLoading(btn, true, 'Guardando...');
            try {
                await api.forcePasswordChange(currentPass, newPass);
                await api.logout();
                await Swal.fire('Éxito', 'Contraseña actualizada. Inicie sesión nuevamente.', 'success');
                window.location.href = 'login.html';
            } catch (err) {
                ui.setLoading(btn, false, 'Guardar nueva contraseña');
                ui.showAlert('alert-box', err.message || 'No se pudo actualizar la contraseña.');
            }
        });
    </script>
</body>

</html>
