# ============================================================
# SISTEMA DE CARNETIZACIÓN INTELIGENTE (SCI-TSS)
# Configuración VirtualHost Apache — XAMPP (Windows)
# ============================================================
# INSTRUCCIONES DE INSTALACIÓN EN XAMPP:
#
#   1. Copiar carpeta php-app/ a:
#      C:\xampp\htdocs\sci-tss\
#
#   2. Editar: C:\xampp\apache\conf\extra\httpd-vhosts.conf
#      Agregar el bloque VirtualHost de este archivo al final.
#
#   3. Editar: C:\Windows\System32\drivers\etc\hosts (como Administrador)
#      Agregar: 127.0.0.1   sci-tss.local
#
#   4. Editar: C:\xampp\apache\conf\httpd.conf
#      Descomentar: Include conf/extra/httpd-vhosts.conf
#
#   5. Reiniciar Apache desde XAMPP Control Panel.
#
#   6. Acceder: http://sci-tss.local/
# ============================================================

# VirtualHost principal — PHP App (sin SSL para pre-producción local)
<VirtualHost *:80>
    ServerName   sci-tss.local
    ServerAlias  www.sci-tss.local
    ServerAdmin  admin@sci-tss.local

    # DocumentRoot apunta a la aplicación PHP
    DocumentRoot "C:/xampp/htdocs/sci-tss"

    # ── Directorio raíz de la aplicación ─────────────────────
    <Directory "C:/xampp/htdocs/sci-tss">
        Options    -Indexes +FollowSymLinks   # -Indexes: ocultar listado de directorios
        AllowOverride All                      # Permite .htaccess para reescritura de URLs
        Require    all granted

        # ── Reescritura para routing limpio ──────────────────
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.html [QSA,L]
    </Directory>

    # ── Protección del directorio de configuración ────────────
    # Bloquear acceso web a archivos sensibles de configuración
    <Directory "C:/xampp/htdocs/sci-tss/api/config">
        Require all denied
    </Directory>

    <Directory "C:/xampp/htdocs/sci-tss/includes">
        Require all denied
    </Directory>

    <Directory "C:/xampp/htdocs/sci-tss/db">
        Require all denied
    </Directory>

    # ── Protección de archivos sensibles por extensión ────────
    <FilesMatch "\.(sql|env|ini|log|bak|rar|zip)$">
        Require all denied
    </FilesMatch>

    # ── Límites de carga de imágenes (Apache nivel) ───────────
    # Complementa la configuración de php.ini.
    # LimitRequestBody en bytes: 12M = 12582912 bytes
    LimitRequestBody 12582912

    # ── Cabeceras de seguridad HTTP ───────────────────────────
    <IfModule mod_headers.c>
        # Previene que el navegador infiera el tipo de contenido (anti-MIME sniffing)
        Header always set X-Content-Type-Options    "nosniff"
        # Controla la política de referrer para proteger URLs internas
        Header always set Referrer-Policy           "strict-origin-when-cross-origin"
        # Previene que la app se abra en un iframe (anti-Clickjacking)
        Header always set X-Frame-Options           "SAMEORIGIN"
        # Activa la protección XSS del navegador
        Header always set X-XSS-Protection          "1; mode=block"
    </IfModule>

    # ── Logs de Apache ────────────────────────────────────────
    ErrorLog  "C:/xampp/apache/logs/sci-tss-error.log"
    CustomLog "C:/xampp/apache/logs/sci-tss-access.log" combined

    # ── Caché para assets estáticos ───────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg  "access plus 7 days"
        ExpiresByType image/png   "access plus 7 days"
        ExpiresByType text/css    "access plus 1 day"
        ExpiresByType text/javascript "access plus 1 day"
    </IfModule>
</VirtualHost>
